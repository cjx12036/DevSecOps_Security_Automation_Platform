name: security-scan

on:
  push:
    paths:
      - 'demo_app/**'
      - 'secscan/**'
      - '.github/workflows/security-scan.yml'
      - 'policy.yml'
  pull_request:
    paths:
      - 'demo_app/**'
      - 'secscan/**'
      - '.github/workflows/security-scan.yml'
      - 'policy.yml'

jobs:
  secscan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Build Changed Scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          rm -rf scan_scope
          mkdir -p scan_scope

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --prune origin "${{ github.base_ref }}"
            mapfile -t changed < <(git diff --name-only "origin/${{ github.base_ref }}...${{ github.sha }}")
          else
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              mapfile -t changed < <(git ls-files)
            else
              mapfile -t changed < <(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
            fi
          fi

          files=()
          for f in "${changed[@]}"; do
            if [[ "$f" == demo_app/* ]] && [ -f "$f" ]; then
              files+=("$f")
            fi
          done

          if [ "${#files[@]}" -eq 0 ]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "No changed files under demo_app/."
            exit 0
          fi

          echo "has_files=true" >> "$GITHUB_OUTPUT"
          for f in "${files[@]}"; do
            mkdir -p "scan_scope/$(dirname "$f")"
            cp "$f" "scan_scope/$f"
          done

          echo "Changed files to scan:"
          printf '%s\n' "${files[@]}"

      - name: Init Empty Outputs (No Changed demo_app Files)
        if: steps.scope.outputs.has_files == 'false'
        run: |
          python - << 'PY'
          import json
          empty_sarif = {
            "$schema": "https://schemastore.azurewebsites.net/schemas/json/sarif-2.1.0-rtm.5.json",
            "version": "2.1.0",
            "runs": [{"tool": {"driver": {"name": "secscan", "version": "0.1.0", "rules": []}}, "results": []}],
          }
          with open("sast.json", "w", encoding="utf-8") as f:
            json.dump({"findings": []}, f, indent=2)
          with open("secrets.json", "w", encoding="utf-8") as f:
            json.dump({"findings": []}, f, indent=2)
          with open("sast.sarif", "w", encoding="utf-8") as f:
            json.dump(empty_sarif, f, indent=2)
          with open("secrets.sarif", "w", encoding="utf-8") as f:
            json.dump(empty_sarif, f, indent=2)
          PY

      - name: Run SAST (SARIF)
        if: steps.scope.outputs.has_files == 'true'
        run: |
          rc=0
          python -m secscan.cli sast --path scan_scope/demo_app --format sarif --output sast.sarif --exclude ".venv,dist,build,node_modules,.git,artifacts" || rc=$?
          if [ "$rc" -gt 1 ]; then exit "$rc"; fi

      - name: Run Secrets (SARIF)
        if: steps.scope.outputs.has_files == 'true'
        run: |
          rc=0
          python -m secscan.cli secrets --path scan_scope/demo_app --format sarif --output secrets.sarif --exclude ".venv,dist,build,node_modules,.git,artifacts" || rc=$?
          if [ "$rc" -gt 1 ]; then exit "$rc"; fi

      - name: Run SAST (JSON)
        if: steps.scope.outputs.has_files == 'true'
        run: |
          rc=0
          python -m secscan.cli sast --path scan_scope/demo_app --format json --output sast.json --exclude ".venv,dist,build,node_modules,.git,artifacts" || rc=$?
          if [ "$rc" -gt 1 ]; then exit "$rc"; fi

      - name: Run Secrets (JSON)
        if: steps.scope.outputs.has_files == 'true'
        run: |
          rc=0
          python -m secscan.cli secrets --path scan_scope/demo_app --format json --output secrets.json --exclude ".venv,dist,build,node_modules,.git,artifacts" || rc=$?
          if [ "$rc" -gt 1 ]; then exit "$rc"; fi

      - name: Merge findings and enforce policy
        run: |
          python -c 'import json; a=json.load(open("sast.json")); b=json.load(open("secrets.json")); json.dump({"findings":a.get("findings",[])+b.get("findings",[])}, open("findings.json","w"), indent=2)'
          python -m secscan.cli policy --input findings.json --policy policy.yml

      - name: Upload SAST SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sast.sarif
          category: secscan-sast

      - name: Upload Secrets SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: secrets.sarif
          category: secscan-secrets
