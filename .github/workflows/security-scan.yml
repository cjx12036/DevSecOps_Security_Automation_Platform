name: security-scan

on:
  push:
    paths:
      - 'demo_app/**'
      - 'secscan/**'
      - '.github/workflows/security-scan.yml'
      - 'policy.yml'
  pull_request:
    paths:
      - 'demo_app/**'
      - 'secscan/**'
      - '.github/workflows/security-scan.yml'
      - 'policy.yml'

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secscan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Trivy CLI
        run: |
          set -euo pipefail
          TRIVY_VERSION=0.68.2
          wget -q https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz
          tar -xzf trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz trivy
          sudo install -m 0755 trivy /usr/local/bin/trivy
          trivy --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . semgrep

      - name: Build Changed Scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          rm -rf scan_scope
          mkdir -p scan_scope

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --prune origin "${{ github.base_ref }}"
            mapfile -t changed < <(git diff --name-only "origin/${{ github.base_ref }}...${{ github.sha }}")
          else
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              mapfile -t changed < <(git ls-files)
            else
              mapfile -t changed < <(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
            fi
          fi

          files=()
          for f in "${changed[@]}"; do
            if [[ "$f" == demo_app/* ]] && [ -f "$f" ]; then
              files+=("$f")
            fi
          done

          if [ "${#files[@]}" -eq 0 ]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "No changed files under demo_app/."
            exit 0
          fi

          echo "has_files=true" >> "$GITHUB_OUTPUT"
          for f in "${files[@]}"; do
            mkdir -p "scan_scope/$(dirname "$f")"
            cp "$f" "scan_scope/$f"
          done

          echo "Changed files to scan:"
          printf '%s\n' "${files[@]}"

      - name: Init Empty Outputs (No Changed demo_app Files)
        if: steps.scope.outputs.has_files == 'false'
        run: |
          python - << 'PY'
          import json
          empty_sarif = {
            "$schema": "https://schemastore.azurewebsites.net/schemas/json/sarif-2.1.0-rtm.5.json",
            "version": "2.1.0",
            "runs": [{"tool": {"driver": {"name": "secscan", "version": "0.1.0", "rules": []}}, "results": []}],
          }
          for name in ["sast", "secrets", "findings"]:
            with open(f"{name}.json", "w", encoding="utf-8") as f:
              json.dump({"findings": []}, f, indent=2)
            with open(f"{name}.sarif", "w", encoding="utf-8") as f:
              json.dump(empty_sarif, f, indent=2)
          with open("summary.json", "w", encoding="utf-8") as f:
            json.dump({"total": 0, "by_severity": {"critical": 0, "high": 0, "medium": 0, "low": 0}}, f, indent=2)
          PY

      - name: Run Agent Scan (Semgrep + Trivy, with fallback)
        if: steps.scope.outputs.has_files == 'true'
        run: |
          python -m secscan.cli agent \
            --path scan_scope/demo_app \
            --out-dir . \
            --severity-threshold low \
            --sast-engine auto \
            --secrets-engine auto \
            --exclude ".venv,dist,build,node_modules,.git,artifacts,findings_db.json"

      - name: Sync Governance DB
        if: steps.scope.outputs.has_files == 'true'
        run: |
          [ -f findings_db.json ] || echo '{"items":{}}' > findings_db.json
          python -m secscan.cli sync --input findings.json --db findings_db.json

      - name: Auto Commit Governance DB
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.scope.outputs.has_files == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add findings_db.json
          if git diff --cached --quiet; then
            echo "No findings_db.json changes to commit"
            exit 0
          fi
          git commit -m "chore(governance): update findings_db [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Upload SAST SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sast.sarif
          category: secscan-sast

      - name: Upload Secrets SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: secrets.sarif
          category: secscan-secrets

      - name: Enforce policy
        run: |
          python -m secscan.cli policy --input findings.json --policy policy.yml
